# Nginx 反代模板 — 域名 + HTTPS 上线后用
# 用法：放到 /etc/nginx/sites-available/redmatrix.conf，改下面两个 server_name，软链到 sites-enabled
# 然后 certbot --nginx -d app.your-domain.com -d api.your-domain.com

# ── 网页前端 ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.your-domain.com;

    # certbot 会自动写入 ssl_certificate / ssl_certificate_key
    # ssl_certificate     /etc/letsencrypt/live/app.your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.your-domain.com/privkey.pem;

    client_max_body_size 50m;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── 后端 API（独立子域名，方便 CORS）─────────────────────────────
server {
    listen 80;
    server_name api.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.your-domain.com;

    client_max_body_size 50m;

    # SSE / 流式 AI 写作 需要这两个
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # AI 写作可能跑较久
        proxy_send_timeout 600s;
    }
}
